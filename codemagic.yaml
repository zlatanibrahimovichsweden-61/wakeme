# ──────────────────────────────────────────────────────────────────────────
# Codemagic CI pipeline — builds, signs, and ships Wakey's iOS app to
# TestFlight from a cloud Mac (you don't need your own Mac).
#
# ONE-TIME SETUP in the Codemagic UI before this runs:
#   1. App Store Connect integration:
#        Teams → Integrations → App Store Connect → add an API key.
#        Name it "wakey_app_store" (matches `integrations.app_store_connect`).
#   2. Environment variable group named "wakey_secrets" containing:
#        MAPS_API_KEY = <your Google Maps key with "Maps SDK for iOS" enabled>
#      Mark it Secure.
#   3. In App Store Connect, create the app record with bundle id
#        com.wakey.wakey  (so signing + TestFlight upload have a target).
#
# The Flutter project lives in the `wakey/` subfolder, hence working_directory.
# ──────────────────────────────────────────────────────────────────────────
workflows:
  # ── FREE phase: no Apple Developer account needed ──────────────────────────
  # Compiles the iOS app unsigned to prove it builds (pods resolve, Maps SDK +
  # all plugins + Swift compile). Cannot install or ship — just validation.
  # Run this now; switch to `ios-testflight` once you have the $99 account.
  ios-build-check:
    name: Wakey iOS — build check (unsigned, free)
    instance_type: mac_mini_m2
    max_build_duration: 45
    working_directory: wakey
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: frontend
          include: true
    scripts:
      - name: Inject Maps key + ensure .env exists
        script: |
          set -e
          # .env is gitignored, so it's absent in the CI clone — but pubspec
          # lists it as a bundled asset, so it MUST exist or asset bundling
          # fails. Always create it. Use the secret if the wakey_secrets group
          # is set; otherwise a blank key is fine for a compile-only sim build.
          if [ -n "$MAPS_API_KEY" ]; then
            echo "MAPS_API_KEY=$MAPS_API_KEY" > .env
            echo "MAPS_API_KEY=$MAPS_API_KEY" > ios/Flutter/Maps.xcconfig
          else
            echo "MAPS_API_KEY=" > .env
          fi
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (simulator, no signing)
        # A simulator build needs NO Development Team / signing, so it verifies
        # the app compiles end-to-end without an Apple Developer account.
        # (`--no-codesign` still builds for a *device*, which Xcode forces to
        # have a signing team — that's what failed before.)
        script: flutter build ios --simulator
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # ── PAID phase: needs the Apple Developer account + the 3 UI setup steps ────
  ios-testflight:
    name: Wakey iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: wakey
    integrations:
      app_store_connect: wakey_app_store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.wakey.wakey
      groups:
        - wakey_secrets        # provides MAPS_API_KEY
      vars:
        BUNDLE_ID: "com.wakey.wakey"
        # When you reach the paid phase, add APP_STORE_APP_ID here (the numeric
        # "Apple ID" from the app's App Store Connect → General Information
        # page), e.g.  APP_STORE_APP_ID: "1234567890". Until then the build
        # number lookup below falls back to 1. (Codemagic rejects empty vars,
        # so it's intentionally omitted rather than left blank.)
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Inject secrets (.env for Dart + Maps.xcconfig for native)
        script: |
          set -e
          # Dart side (flutter_dotenv) loads wakey/.env
          echo "MAPS_API_KEY=$MAPS_API_KEY" > .env
          # iOS native key, surfaced as the MAPS_API_KEY build setting
          echo "MAPS_API_KEY=$MAPS_API_KEY" > ios/Flutter/Maps.xcconfig
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Apply signing profiles to the Xcode project
        script: xcode-project use-profiles
      - name: Bump build number from App Store Connect
        script: |
          # Use 1 + the latest TestFlight build number so uploads never clash.
          # Falls back to 0 (→ build 1) on the very first build, before the app
          # exists in App Store Connect / APP_STORE_APP_ID is filled in.
          LATEST=$(app-store-connect get-latest-testflight-build-number "${APP_STORE_APP_ID:-}" 2>/dev/null || echo 0)
          echo "Latest TestFlight build: $LATEST"
          echo "BUILD_NUMBER=$(($LATEST + 1))" >> $CM_ENV
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-number=${BUILD_NUMBER:-1} \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to TestFlight automatically; leave App Store submission manual
        # for now so you control the public release.
        submit_to_testflight: true
        # submit_to_app_store: false
