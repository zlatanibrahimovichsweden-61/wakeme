org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation. Required because the Pub cache lives
# on C:\ while the project lives on F:\, and Kotlin's incremental cache uses
# relative-path math that crashes across drive letters on Windows.
kotlin.incremental=false
